<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🏐 3v3 排球小游戏</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#1a1a2e; display:flex; justify-content:center; align-items:center; height:100vh; overflow:hidden; font-family:'Microsoft YaHei','Arial',sans-serif; user-select:none; }
#container { position:relative; width:1280px; height:720px; }
canvas { display:block; width:1280px; height:720px; image-rendering:auto; }
#ui-layer { position:absolute; top:0; left:0; width:100%; height:100%; pointer-events:none; }
#login-screen, #mode-screen { position:absolute; top:0; left:0; width:100%; height:100%; display:flex; flex-direction:column; justify-content:center; align-items:center; z-index:10; }
#login-screen { background:#1a1a2e; }
#mode-screen { background:#1a1a2e; display:none; }
#login-screen h1 { color:#fff; font-size:42px; margin-bottom:8px; }
#login-screen p { color:#c8c8dc; font-size:20px; margin-bottom:20px; }
#name-input { width:300px; padding:10px; font-size:22px; background:#2a2a4e; color:#fff; border:none; border-radius:8px; text-align:center; outline:none; }
#login-btn { margin-top:16px; padding:12px 40px; font-size:20px; background:#FF9800; color:#fff; border:none; border-radius:10px; cursor:pointer; }
#login-btn:hover { background:#e68900; }
#error-text { color:#f66; margin-top:8px; font-size:14px; min-height:20px; }
#mode-screen h1 { color:#fff; font-size:36px; margin-bottom:8px; }
#mode-screen p { color:#c8c8dc; font-size:22px; margin-bottom:24px; }
.mode-btn { width:260px; padding:14px 0; font-size:20px; color:#fff; border:none; border-radius:10px; cursor:pointer; margin:6px 0; }
.mode-btn:hover { filter:brightness(1.15); }
#btn-easy { background:#4CAF50; }
#btn-normal { background:#FF9800; }
#btn-hard { background:#F44336; }
#btn-back { margin-top:16px; padding:8px 20px; font-size:14px; background:#555; color:#fff; border:none; border-radius:8px; cursor:pointer; }
.ui-text { position:absolute; left:0; width:100%; text-align:center; font-weight:bold; }
</style>
</head>
<body>
<div id="container">
  <canvas id="gameCanvas"></canvas>
  <div id="ui-layer">
    <div class="ui-text" id="ui-mode" style="top:28px; color:#FFD700; font-size:13px;">选手: 玩家</div>
    <div class="ui-text" id="ui-player" style="top:46px; color:cyan; font-size:13px;">控制: -</div>
    <div class="ui-text" id="ui-score" style="top:64px; color:#fff; font-size:20px;">我方 0 - 0 敌方</div>
    <div class="ui-text" id="ui-speed" style="top:88px; color:yellow; font-size:13px;">速度 V: 4.0</div>
    <div class="ui-text" id="ui-state" style="top:106px; color:lime; font-size:13px;">按空格键开始游戏</div>
  </div>
  <div id="login-screen">
    <h1>🏐 3v3 排球小游戏</h1>
    <p>请输入你的选手名</p>
    <input type="text" id="name-input" value="玩家" maxlength="10">
    <button id="login-btn">🚀 进入游戏</button>
    <div id="error-text"></div>
  </div>
  <div id="mode-screen">
    <h1>🏐 3v3 排球小游戏</h1>
    <p>请选择游戏模式</p>
    <button class="mode-btn" id="btn-easy">🟢 简单模式</button>
    <button class="mode-btn" id="btn-normal">🟡 普通模式</button>
    <button class="mode-btn" id="btn-hard">🔴 困难模式</button>
    <button id="btn-back">↩ 返回修改名字</button>
  </div>
</div>

<audio id="bgm-audio" loop preload="auto"><source src="bgm.mp3" type="audio/mpeg"></audio>
<audio id="whistle-audio" preload="auto"><source src="whistle.mp3" type="audio/mpeg"></audio>

<script>
const W=1280, H=720;
const canvas=document.getElementById('gameCanvas');
const dpr=Math.min(window.devicePixelRatio||1, 2);
canvas.width=W*dpr; canvas.height=H*dpr;
const ctx=canvas.getContext('2d');
ctx.scale(dpr, dpr);

/* ============================================================
   PlayerData - 精确对应 Java PlayerData.java
   修复：HIT_RADIUS 改回 0.9（原Java值），不再是 1.1
   ============================================================ */
class PlayerData {
  constructor(idx, team, x, y) {
    this.index=idx; this.team=team; this.isHumanControlled=false;
    this.x=this.defX=x; this.y=this.defY=y; this.z=0; this.vz=0;
    this.facingX=0; this.facingY=(team===0)?1:-1;
    this.bodyAngle=Math.atan2(this.facingX,this.facingY);
    this.targetBodyAngle=this.bodyAngle; this.prevBodyAngle=this.bodyAngle;
    this.swingType=0; this.swingTimer=0; this.runTimer=0; this.isMoving=false;
    this.aiBlunderCooldown=0;
  }
  static MOVE_SPEED=5.0;
  static HIT_CENTER_H=1.0;
  static HIT_RADIUS=0.9;           // ★ 修复：恢复为 Java 原值 0.9（原网页版错误设为 1.1）
  static PLAYER_GRAVITY=8.0;
  static JUMP_HEIGHT=2.6;
  static JUMP_VZ=Math.sqrt(2*PlayerData.PLAYER_GRAVITY*PlayerData.JUMP_HEIGHT);
  static SWING_DURATION=0.3;

  /* canHit - 精确对应 Java PlayerData.canHit */
  canHit(bx,by,bz,radius) {
    if(radius===undefined)radius=PlayerData.HIT_RADIUS;
    let cx=this.x, cy=this.y, cz=this.z+PlayerData.HIT_CENTER_H;
    let dx=bx-cx, dy=by-cy, dz=bz-cz;
    let dist=Math.sqrt(dx*dx+dy*dy+dz*dz);
    if(dist>radius)return false;
    let hLen=Math.sqrt(dx*dx+dy*dy);
    if(hLen<0.001)return true;
    let dp=this.facingX*(dx/hLen)+this.facingY*(dy/hLen);
    return dp>=-0.866&&dp<=0.866;
  }

  startSwing(spike){this.swingType=spike?2:1;this.swingTimer=PlayerData.SWING_DURATION;}

  /* updatePhysics - 精确对应 Java PlayerData.updatePhysics */
  updatePhysics(dt){
    if(this.z>0||this.vz>0){
      this.vz-=PlayerData.PLAYER_GRAVITY*dt;
      this.z+=this.vz*dt;
      if(this.z<=0){this.z=0;this.vz=0;}
    }
    this.updateSwing(dt);
    this.smoothBodyAngle(dt);
    if(Math.abs(this.vz)>0.1||this.z>0.01)this.runTimer=0;
  }

  /* updateSwing - 精确对应 Java PlayerData.updateSwing */
  updateSwing(dt){
    if(this.swingTimer>0){
      this.swingTimer-=dt;
      if(this.swingTimer<=0){this.swingType=0;this.swingTimer=0;}
    }
    if(this.aiBlunderCooldown>0){
      this.aiBlunderCooldown-=dt;
      if(this.aiBlunderCooldown<0)this.aiBlunderCooldown=0;
    }
  }

  updateFacing(fx,fy){this.facingX=fx;this.facingY=fy;this.targetBodyAngle=Math.atan2(fx,fy);}

  /* smoothBodyAngle - 精确对应 Java PlayerData.smoothBodyAngle */
  smoothBodyAngle(dt){
    this.prevBodyAngle=this.bodyAngle;
    let diff=this.targetBodyAngle-this.bodyAngle;
    while(diff>Math.PI)diff-=2*Math.PI;
    while(diff<-Math.PI)diff+=2*Math.PI;
    let step=dt*12.0;
    if(Math.abs(diff)<=step)this.bodyAngle=this.targetBodyAngle;
    else this.bodyAngle+=Math.sign(diff)*step;
    while(this.bodyAngle>Math.PI)this.bodyAngle-=2*Math.PI;
    while(this.bodyAngle<-Math.PI)this.bodyAngle+=2*Math.PI;
  }

  /* resetToDefault - 精确对应 Java PlayerData.resetToDefault */
  resetToDefault(){
    this.x=this.defX;this.y=this.defY;this.z=0;this.vz=0;
    this.runTimer=0;this.isMoving=false;
    this.facingX=0;this.facingY=(this.team===0)?1:-1;
    this.bodyAngle=Math.atan2(this.facingX,this.facingY);
    this.targetBodyAngle=this.bodyAngle;this.prevBodyAngle=this.bodyAngle;
    this.swingType=0;this.swingTimer=0;this.aiBlunderCooldown=0;
  }

  jump(){if(this.z<=0.01)this.vz=PlayerData.JUMP_VZ;}
}

/* ============================================================
   GameRenderer - 精确对应 Java GameRenderer.java
   ============================================================ */
class GameRenderer {
  constructor(){this.spectatorData=null;this.initSpectators();}
  static SCALE=36.0; static COS30=0.8660254; static SIN30=0.5; static OX=200; static OY=530;
  static SPECTATOR_COLORS=['#dc3c3c','#3c8c3c','#3c3cc8','#dcb428','#dc7828','#a03cc8','#3cb4b4'];

  static p(x,y,z){return[GameRenderer.OX+(x+y)*GameRenderer.COS30*GameRenderer.SCALE,GameRenderer.OY+(x-y)*GameRenderer.SIN30*GameRenderer.SCALE-z*GameRenderer.SCALE];}
  pw(pl,lx,ly,z){return GameRenderer.p(pl.x+lx*pl.facingY+ly*pl.facingX,pl.y-lx*pl.facingX+ly*pl.facingY,z);}
  fillPoly(pts){ctx.beginPath();ctx.moveTo(pts[0][0],pts[0][1]);for(let i=1;i<pts.length;i++)ctx.lineTo(pts[i][0],pts[i][1]);ctx.closePath();ctx.fill();}
  strokePoly(pts,closed){ctx.beginPath();ctx.moveTo(pts[0][0],pts[0][1]);for(let i=1;i<pts.length;i++)ctx.lineTo(pts[i][0],pts[i][1]);if(closed)ctx.closePath();ctx.stroke();}
  fillRect(x0,y0,x1,y1,color){ctx.fillStyle=color;this.fillPoly([GameRenderer.p(x0,y0,0),GameRenderer.p(x1,y0,0),GameRenderer.p(x1,y1,0),GameRenderer.p(x0,y1,0)]);}

  drawCourt(){
    let p=GameRenderer.p;
    ctx.fillStyle='#23592d';this.fillPoly([p(-3,-2,-0.01),p(12,-2,-0.01),p(12,20,-0.01),p(-3,20,-0.01)]);
    this.fillRect(0,0,9,9,'#e6af46');this.fillRect(0,9,9,18,'#d29b32');
    ctx.strokeStyle='#fff';ctx.lineWidth=2.5;this.strokePoly([p(0,0,0),p(9,0,0),p(9,18,0),p(0,18,0)],true);
    ctx.beginPath();ctx.moveTo(p(0,9,0.01)[0],p(0,9,0.01)[1]);ctx.lineTo(p(9,9,0.01)[0],p(9,9,0.01)[1]);ctx.stroke();
    ctx.lineWidth=1.5;ctx.strokeStyle='#ebebeb';
    ctx.beginPath();ctx.moveTo(p(0,3,0.01)[0],p(0,3,0.01)[1]);ctx.lineTo(p(9,3,0.01)[0],p(9,3,0.01)[1]);ctx.stroke();
    ctx.beginPath();ctx.moveTo(p(0,15,0.01)[0],p(0,15,0.01)[1]);ctx.lineTo(p(9,15,0.01)[0],p(9,15,0.01)[1]);ctx.stroke();
  }

  drawNetBack(core){let p=GameRenderer.p,bl=p(0,9,0),br=p(9,9,0),tl=p(0,9,2.43),tr=p(9,9,2.43);ctx.strokeStyle='#5a5a5f';ctx.lineWidth=6;ctx.beginPath();ctx.moveTo(bl[0],bl[1]);ctx.lineTo(tl[0],tl[1]);ctx.stroke();ctx.beginPath();ctx.moveTo(br[0],br[1]);ctx.lineTo(tr[0],tr[1]);ctx.stroke();}

  drawNetFront(core){
    let p=GameRenderer.p,h=2.43,bl=p(0,9,0),br=p(9,9,0),tl=p(0,9,h),tr=p(9,9,h),dent=0;
    if(core.netHitTimer>0)dent=(core.netHitTimer/0.3)*0.5;
    ctx.fillStyle='rgba(200,200,230,0.35)';
    if(dent>0.01){let dx=core.netHitX;this.fillPoly([p(0,9,0),p(dx-0.6,9,0),p(dx,9-dent,2.43*(dent/0.5)),p(dx+0.6,9,0),p(9,9,0),p(9,9,h),p(0,9,h)]);}
    else this.fillPoly([bl,br,tr,tl]);
    ctx.strokeStyle='rgba(180,180,190,0.5)';ctx.lineWidth=1.5;ctx.beginPath();ctx.moveTo(bl[0],bl[1]);ctx.lineTo(br[0],br[1]);ctx.stroke();
    ctx.strokeStyle='rgba(240,240,245,0.8)';ctx.lineWidth=5;ctx.beginPath();ctx.moveTo(tl[0],tl[1]);ctx.lineTo(tr[0],tr[1]);ctx.stroke();
    for(let i=1;i<=5;i++){let hh=h*i/6;ctx.strokeStyle='rgba(200,200,220,0.35)';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(p(0,9,hh)[0],p(0,9,hh)[1]);ctx.lineTo(p(9,9,hh)[0],p(9,9,hh)[1]);ctx.stroke();}
    ctx.strokeStyle='rgba(200,200,220,0.2)';ctx.lineWidth=0.8;for(let i=1;i<=8;i++){let xx=i;ctx.beginPath();ctx.moveTo(p(xx,9,0.05)[0],p(xx,9,0.05)[1]);ctx.lineTo(p(xx,9,h-0.05)[0],p(xx,9,h-0.05)[1]);ctx.stroke();}
    let ptl=p(0,9,h+0.1),ptr=p(9,9,h+0.1);ctx.fillStyle='#f0f0f0';ctx.beginPath();ctx.ellipse(ptl[0],ptl[1],5,5,0,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.ellipse(ptr[0],ptr[1],5,5,0,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle='#c83c3c';ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(ptl[0],ptl[1]);ctx.lineTo(ptl[0]-12,ptl[1]-30);ctx.stroke();ctx.beginPath();ctx.moveTo(ptr[0],ptr[1]);ctx.lineTo(ptr[0]+12,ptr[1]-30);ctx.stroke();
  }

  drawPlayer(pl){
    let p=GameRenderer.p,pw=this.pw.bind(this);
    let fz=pl.z,ah=fz+0.15,kh=fz+0.55,hh=fz+1.0,ch=fz+1.45,sh=fz+1.8,nh=fz+1.92,hd=fz+2.07;
    let my=pl.team===0,jersey=my?'#3250dc':'#dc3232',jd=my?'#1e37a0':'#a01e1e',shorts=my?'#142878':'#821414',shoe='#232328',skin='#fad2aa';
    let s=p(pl.x,pl.y,0.02);ctx.fillStyle='rgba(0,0,0,0.3)';ctx.beginPath();ctx.ellipse(s[0],s[1],11,6,0,0,Math.PI*2);ctx.fill();
    let ba=pl.bodyAngle,cosBA=Math.cos(ba),sinBA=Math.sin(ba),ff=Math.max(0,-cosBA),bf=Math.max(0,cosBA),sf=Math.abs(sinBA);
    let rc=pl.runTimer*14.0,loL=0,loR=0;
    if(pl.isMoving&&Math.abs(pl.vz)<0.1&&pl.z<0.01){loL=Math.sin(rc)*0.16;loR=Math.sin(rc+Math.PI)*0.16;}
    let hip=p(pl.x,pl.y,hh),kl=pw(pl,-0.07+loL,0,kh),kr=pw(pl,0.07+loR,0,kh),al=pw(pl,-0.09+loL*2,0,ah),ar=pw(pl,0.09+loR*2,0,ah),sl=pw(pl,-0.11+loL*2,0,fz+0.03),sr=pw(pl,0.11+loR*2,0,fz+0.03);
    ctx.strokeStyle=shorts;ctx.lineWidth=6;ctx.beginPath();ctx.moveTo(hip[0],hip[1]);ctx.lineTo(kl[0],kl[1]);ctx.stroke();ctx.beginPath();ctx.moveTo(hip[0],hip[1]);ctx.lineTo(kr[0],kr[1]);ctx.stroke();
    ctx.strokeStyle=skin;ctx.lineWidth=5;ctx.beginPath();ctx.moveTo(kl[0],kl[1]);ctx.lineTo(al[0],al[1]);ctx.stroke();ctx.beginPath();ctx.moveTo(kr[0],kr[1]);ctx.lineTo(ar[0],ar[1]);ctx.stroke();
    ctx.strokeStyle=shoe;ctx.lineWidth=7;ctx.beginPath();ctx.moveTo(al[0],al[1]);ctx.lineTo(sl[0],sl[1]);ctx.stroke();ctx.beginPath();ctx.moveTo(ar[0],ar[1]);ctx.lineTo(sr[0],sr[1]);ctx.stroke();
    let hl=pw(pl,-0.13,0,hh),hr=pw(pl,0.13,0,hh);ctx.strokeStyle=shorts;ctx.lineWidth=9;ctx.beginPath();ctx.moveTo(hl[0],hl[1]);ctx.lineTo(hr[0],hr[1]);ctx.stroke();
    let td=0.05*(bf-ff),chest=p(pl.x-td*pl.facingX,pl.y-td*pl.facingY,ch),shoulder=p(pl.x-td*pl.facingX,pl.y-td*pl.facingY,sh),bc=(ff>0.4)?jersey:jd;
    ctx.strokeStyle=bc;ctx.lineWidth=10;ctx.beginPath();ctx.moveTo(hip[0],hip[1]);ctx.lineTo(chest[0],chest[1]);ctx.stroke();
    ctx.lineWidth=9;ctx.beginPath();ctx.moveTo(chest[0],chest[1]);ctx.lineTo(shoulder[0],shoulder[1]);ctx.stroke();
    if(ff>0.5){ctx.fillStyle='#fff';ctx.font='10px Arial';ctx.fillText(''+(pl.index%3+1),chest[0]-3,chest[1]+4);}
    let sw=0.23*(0.7+0.3*(ff+sf)),sL=pw(pl,-sw,0,sh),sR=pw(pl,sw,0,sh);ctx.strokeStyle=bc;ctx.lineWidth=6;ctx.beginPath();ctx.moveTo(sL[0],sL[1]);ctx.lineTo(sR[0],sR[1]);ctx.stroke();
    this.drawArms(pl,sh,sL,sR,skin,jersey);
    let neck=p(pl.x-td*0.5*pl.facingX,pl.y-td*0.5*pl.facingY,nh);ctx.strokeStyle=skin;ctx.lineWidth=3.5;ctx.beginPath();ctx.moveTo(shoulder[0],shoulder[1]);ctx.lineTo(neck[0],neck[1]);ctx.stroke();
    let head=p(pl.x-td*0.3*pl.facingX,pl.y-td*0.3*pl.facingY,hd);this.drawHead(pl,head,ff,bf,sf,sinBA);
  }

  drawHead(pl,head,ff,bf,sf,sd){
    let skin='#fad2aa',skinS='#dcb491',hair='#2d1c12',hairH='#3e281c',hx=head[0],hy=head[1],r=6.8;
    ctx.fillStyle=skin;ctx.beginPath();ctx.ellipse(hx,hy+1,r,r-1,0,0,Math.PI*2);ctx.fill();
    if(bf>0.2){
      ctx.fillStyle=hair;ctx.beginPath();ctx.ellipse(hx,hy,r*1.05,r*1.05,0,0,Math.PI*2);ctx.fill();
      ctx.fillStyle=hairH;ctx.beginPath();ctx.ellipse(hx,hy-r*0.3,r*1.8,r*1.4,0,0,Math.PI*2);ctx.fill();
      ctx.fillStyle=skinS;ctx.beginPath();ctx.ellipse(hx,hy+r-2,3,3.5,0,0,Math.PI*2);ctx.fill();
      if(sf>0.4){ctx.fillStyle=skin;ctx.beginPath();ctx.ellipse(sd>0?hx+r-1:hx-r-3,hy-r+3,3,4.5,0,0,Math.PI*2);ctx.fill();}
    }else if(ff>0.2){
      ctx.fillStyle=hair;ctx.beginPath();ctx.ellipse(hx,hy-r+1,r+1,r*0.8,0,Math.PI,0);ctx.fill();
      ctx.beginPath();ctx.ellipse(hx-r-1.5,hy,3.5,r,0,0,Math.PI*2);ctx.fill();
      ctx.beginPath();ctx.ellipse(hx+r-3,hy,3.5,r,0,0,Math.PI*2);ctx.fill();
      ctx.strokeStyle=hairH;ctx.lineWidth=1;
      for(let i=-3;i<=3;i++){ctx.beginPath();ctx.moveTo(hx+i*2,hy-r-1);ctx.lineTo(hx+i*2,hy-r+5);ctx.stroke();}
      let fv=ff;
      if(fv>0.3){ctx.strokeStyle='rgba(45,28,18,'+(fv*0.9)+')';ctx.lineWidth=2.5;ctx.beginPath();ctx.moveTo(hx-6,hy-2);ctx.lineTo(hx-1,hy-3);ctx.stroke();ctx.beginPath();ctx.moveTo(hx+1,hy-3);ctx.lineTo(hx+6,hy-2);ctx.stroke();}
      if(fv>0.4){ctx.fillStyle='#fafafa';ctx.beginPath();ctx.ellipse(hx-2.5,hy-0.5,3.5,2.5,0,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.ellipse(hx+3.5,hy-0.5,3.5,2.5,0,0,Math.PI*2);ctx.fill();ctx.fillStyle='#141414';ctx.beginPath();ctx.ellipse(hx-2.5,hy-1,1.8,1.8,0,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.ellipse(hx+3.5,hy-1,1.8,1.8,0,0,Math.PI*2);ctx.fill();ctx.fillStyle='#fff';ctx.beginPath();ctx.ellipse(hx-3,hy-1.5,0.8,0.8,0,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.ellipse(hx+3,hy-1.5,0.8,0.8,0,0,Math.PI*2);ctx.fill();}
      if(fv>0.5){ctx.strokeStyle='rgba(210,160,130,'+(fv*0.7)+')';ctx.lineWidth=1.5;ctx.beginPath();ctx.moveTo(hx-0.5,hy+1);ctx.lineTo(hx-1.5,hy+5);ctx.stroke();ctx.beginPath();ctx.moveTo(hx+0.5,hy+1);ctx.lineTo(hx+1.5,hy+5);ctx.stroke();ctx.beginPath();ctx.moveTo(hx-1.5,hy+5);ctx.lineTo(hx+1.5,hy+5);ctx.stroke();}
      if(fv>0.5){ctx.strokeStyle='rgba(190,100,85,'+(fv*0.8)+')';ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(hx-3,hy+7);ctx.lineTo(hx+3,hy+7);ctx.stroke();}
      if(sf>0.15){ctx.fillStyle=skin;ctx.beginPath();ctx.ellipse(sd>0?hx+r-2:hx-r-3,hy-r+4,3,4.5,0,0,Math.PI*2);ctx.fill();}
    }else{
      ctx.fillStyle=hair;ctx.beginPath();ctx.ellipse(sd>0?hx-r:hx-3,hy,r+4,r*2+2,0,0,Math.PI*2);ctx.fill();ctx.fillStyle=skin;
      if(sd>0){ctx.beginPath();ctx.ellipse(hx+1,hy,r*2-3,r*2,0,0,Math.PI*2);ctx.fill();}else{ctx.beginPath();ctx.ellipse(hx-r,hy,r*2-3,r*2,0,0,Math.PI*2);ctx.fill();}
      let ex=(sd>0)?hx+5:hx-4;ctx.fillStyle='#fff';ctx.beginPath();ctx.ellipse(ex,hy-3,2.5,2,0,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#141414';ctx.beginPath();ctx.ellipse(ex+0.5,hy-1.5,1.3,1.3,0,0,Math.PI*2);ctx.fill();
      ctx.strokeStyle=skin;ctx.lineWidth=1.2;

    this.state='WAITING';this.difficulty='NORMAL';
    this.myTeam=[];this.enemyTeam=[];this.allPlayers=[];this.controlledPlayer=null;
    this.ballX=4.5;this.ballY=1.0;this.ballZ=2.0;this.ballVx=0;this.ballVy=0;this.ballVz=0;
    this.ballInPlay=false;this.ballLanded=false;this.lastTouchedByTeam=-1;
    this.myScore=0;this.enemyScore=0;this.servingTeam=-1;this.scoreTimer=0;
    this.servePending=true;this.netHitX=4.5;this.netHitTimer=0;
    this.playerName='玩家';this.lastScorer=-1;this.refArmTimer=0;
    this.cheerTimer=0;this.currentCheer='';this.cheerX=0;this.cheerY=0;
    this.keyW=false;this.keyA=false;this.keyS=false;this.keyD=false;
    this.keySpace=false;this.jumpConsumed=false;this.speedV=4.0;
    this.passClicked=false;this.spikeClicked=false;
    this.mouseWorldX=4.5;this.mouseWorldY=9.0;
    this.myAssigned=-1;this.enemyAssigned=-1;
    this.uiMode=document.getElementById('ui-mode');this.uiPlayer=document.getElementById('ui-player');
    this.uiScore=document.getElementById('ui-score');this.uiSpeed=document.getElementById('ui-speed');
    this.uiState=document.getElementById('ui-state');
    this.CHEER_WIN_TEXTS=['%s太厉害了！','%s勇敢飞，我们永相随！','%s你是最棒的！','%s打败对面啊！','%s不愧是排球之神！','%s好球！','%s无敌！','%s冲啊！','%s必胜！'];
    this.CHEER_LOSE_TEXTS=['%s再加把劲！','%s你一定可以，相信自己！','%s别放弃啊！','%s别打假球啊！','%s加油！','%s不要气馁！','%s下次一定行！','%s稳住心态！','%s我们喜欢你！'];
  }

  /* init - 精确对应 Java GameCore.init() */
  init(difficulty,playerName){
    if(difficulty===undefined)difficulty='NORMAL';
    if(playerName===undefined)playerName='玩家';
    this.difficulty=difficulty;this.playerName=playerName;
    this.myTeam=[new PlayerData(0,0,4.5,7),new PlayerData(1,0,2.0,4),new PlayerData(2,0,7.0,4)];
    this.enemyTeam=[new PlayerData(3,1,4.5,11),new PlayerData(4,1,2.0,14),new PlayerData(5,1,7.0,14)];
    this.allPlayers=[...this.myTeam,...this.enemyTeam];
    this.controlledPlayer=null;
    this.pickRandomPlayer();this.resetBall();this.state='WAITING';
    this.speedV=4.0;this.myScore=0;this.enemyScore=0;
    this.ballLanded=false;this.ballInPlay=false;this.lastTouchedByTeam=-1;
    this.servingTeam=-1;this.scoreTimer=0;this.servePending=true;
    this.netHitX=4.5;this.netHitTimer=0;this.lastScorer=-1;this.refArmTimer=0;
    this.cheerTimer=0;this.currentCheer='';this.myAssigned=-1;this.enemyAssigned=-1;
    this.keyW=false;this.keyA=false;this.keyS=false;this.keyD=false;
    this.keySpace=false;this.jumpConsumed=false;
    this.passClicked=false;this.spikeClicked=false;
    this.updateUI();
  }

  pickRandomPlayer(){
    if(this.controlledPlayer)this.controlledPlayer.isHumanControlled=false;
    let idx=Math.floor(Math.random()*3);
    this.controlledPlayer=this.myTeam[idx];this.controlledPlayer.isHumanControlled=true;
    this.uiPlayer.textContent='控制: '+['前排','后排左','后排右'][idx];
  }

  /* resetBall - 精确对应 Java GameCore.resetBall() */
  resetBall(){this.ballX=4.5;this.ballY=1.0;this.ballZ=2.0;this.ballVx=0;this.ballVy=0;this.ballVz=0;this.ballInPlay=false;}
  clamp(v,lo,hi){return Math.max(lo,Math.min(hi,v));}
  static dist(x1,y1,x2,y2){let dx=x1-x2,dy=y1-y2;return Math.sqrt(dx*dx+dy*dy);}

  /* handleKeyDown - 精确对应 Java GameCore.handleKeyDown() */
  handleKeyDown(code){
    if(code==='KeyW')this.keyW=true;
    else if(code==='KeyA')this.keyA=true;
    else if(code==='KeyS')this.keyS=true;
    else if(code==='KeyD')this.keyD=true;
    else if(code==='Space'){if(!this.keySpace){this.keySpace=true;this.jumpConsumed=false;}}
    else if(code>='Digit0'&&code<='Digit9'){
      let v=parseInt(code[5]);
      this.speedV=Math.max(1,Math.min(10,v));
    }
  }

  /* handleKeyUp - 精确对应 Java GameCore.handleKeyUp() */
  handleKeyUp(code){
    if(code==='KeyW')this.keyW=false;
    else if(code==='KeyA')this.keyA=false;
    else if(code==='KeyS')this.keyS=false;
    else if(code==='KeyD')this.keyD=false;
    else if(code==='Space'){this.keySpace=false;this.jumpConsumed=false;}
  }

  /* mouseMoved - 精确对应 Java GameCore.mouseMoved() */
  mouseMoved(sx,sy){
    let OX=GameRenderer.OX,OY=GameRenderer.OY,COS30=GameRenderer.COS30,SIN30=GameRenderer.SIN30,SCALE=GameRenderer.SCALE;
    let A=(sx-OX)/(COS30*SCALE),B=(sy-OY)/(SIN30*SCALE);
    this.mouseWorldX=this.clamp((A+B)/2.0,0,9);
    this.mouseWorldY=this.clamp((A-B)/2.0,0,18);
  }

  /* start() - 精确对应 Java GameCore.start() */
  start(){
    this.lastTime=0;
    if(this.loop)return;
    this.loop=()=>{
      let now=performance.now()/1000;
      if(this.lastTime===0){this.lastTime=now;requestAnimationFrame(this.loop);return;}
      let dt=now-this.lastTime;
      if(dt>0.05)dt=0.05;
      this.lastTime=now;
      this.update(dt);
      try{this.rend.render(this);}catch(ex){console.error('渲染异常:',ex);}
      requestAnimationFrame(this.loop);
    };
    requestAnimationFrame(this.loop);
  }

  /* update - 精确对应 Java GameCore.update() */
  update(dt){
    if(this.netHitTimer>0){this.netHitTimer-=dt;if(this.netHitTimer<0)this.netHitTimer=0;}
    if(this.refArmTimer>0){this.refArmTimer-=dt;if(this.refArmTimer<=0){this.refArmTimer=0;this.lastScorer=-1;}}
    if(this.cheerTimer>0){this.cheerTimer-=dt;if(this.cheerTimer<=0){this.cheerTimer=0;this.currentCheer='';}}
    switch(this.state){
      case'WAITING':
        if(this.keySpace){this.consumeJump();this.startGame();}
        break;
      case'PLAYING':
        this.updatePlaying(dt);
        break;
      case'SCORE':
        this.scoreTimer+=dt;
        if(this.scoreTimer>=SCORE_PAUSE){
          if(this.myScore>=WIN_SCORE||this.enemyScore>=WIN_SCORE){
            this.state='GAME_OVER';
            this.uiState.textContent=this.myScore>=WIN_SCORE?'我方获胜! 空格重来':'敌方获胜! 空格重来';
          }else{this.startRound();this.state='PLAYING';}
        }
        break;
      case'GAME_OVER':
        if(this.keySpace){
          this.consumeJump();this.myScore=0;this.enemyScore=0;
          this.uiScore.textContent='我方 0 - 0 敌方';
          this.servingTeam=Math.random()<0.5?0:1;
          this.lastTouchedByTeam=-1;
          this.startRound();this.state='PLAYING';
        }
        break;
    }
    this.uiSpeed.textContent='速度 V: '+this.speedV;
  }

  sendScoreUI(){this.uiScore.textContent='我方 '+this.myScore+' - '+this.enemyScore+' 敌方';}
  updateUI(){this.sendScoreUI();this.uiSpeed.textContent='速度 V: '+this.speedV;this.uiMode.textContent='选手: '+this.playerName;}

  startGame(){
    this.myScore=0;this.enemyScore=0;this.sendScoreUI();
    this.servingTeam=Math.random()<0.5?0:1;
    this.lastTouchedByTeam=-1;
    this.startRound();this.state='PLAYING';
  }

  startRound(){
    for(let p of this.allPlayers)p.resetToDefault();
    this.resetBall();this.ballLanded=false;this.scoreTimer=0;
    this.speedV=4.0;this.pickRandomPlayer();this.servePending=true;
    this.netHitTimer=0;this.uiState.textContent='比赛进行中';
  }

  /* updatePlaying - 精确对应 Java GameCore.updatePlaying() */
  updatePlaying(dt){
    if(this.servePending&&!this.ballInPlay){this.doServe();this.servePending=false;}
    this.updateFacing();
    this.updateHumanMove(dt);
    this.updateAI(dt);
    for(let p of this.allPlayers)p.updatePhysics(dt);
    this.checkHumanSwing();
    this.checkHumanHit();
    this.checkAIHit();
    if(this.ballInPlay){
      this.checkNet(dt);
      this.ballVz-=BALL_G*dt;
      this.ballX+=this.ballVx*dt;
      this.ballY+=this.ballVy*dt;
      this.ballZ+=this.ballVz*dt;
      if(this.ballZ<=0.1){this.ballZ=0.1;this.ballInPlay=false;this.checkScore();}
    }
  }

  /* doServe - 精确对应 Java GameCore.doServe() */
  doServe(){
    if(this.servingTeam<0||this.servingTeam>1)this.servingTeam=Math.random()<0.5?0:1;
    let sv=(this.servingTeam===0)?this.myTeam[2]:this.enemyTeam[2];
    this.ballX=sv.x;this.ballY=sv.y+sv.facingY*0.5;this.ballZ=2.0;
    let serveSpeed=3.5+(Math.random()-0.5)*2.0;
    let baseAngle=Math.atan2(sv.facingX,sv.facingY);
    let angleVariation=(Math.random()-0.5)*Math.PI/6;
    let serveAngle=baseAngle+angleVariation;
    this.ballVx=Math.sin(serveAngle)*serveSpeed;
    this.ballVy=Math.cos(serveAngle)*serveSpeed;
    this.ballVz=5.0+Math.random()*1.0;
    this.ballInPlay=true;this.lastTouchedByTeam=sv.team;
  }

  /* updateFacing - 安全版本，增加 null 检查 */
  updateFacing(){
    if(!this.controlledPlayer)return;
    let dx=this.mouseWorldX-this.controlledPlayer.x;
    let dy=this.mouseWorldY-this.controlledPlayer.y;
    let len=Math.sqrt(dx*dx+dy*dy);
    if(len>0.01)this.controlledPlayer.updateFacing(dx/len,dy/len);
  }

  /* updateHumanMove - 安全版本，增加 null 检查 */
  updateHumanMove(dt){
    let p=this.controlledPlayer;
    if(!p)return;
    let dist=PlayerData.MOVE_SPEED*dt;
    let mx=0,my=0;
    if(this.keyW)my+=1;if(this.keyS)my-=1;
    if(this.keyA)mx-=1;if(this.keyD)mx+=1;
    let len=Math.sqrt(mx*mx+my*my);
    if(len>0.001){mx=mx/len*dist;my=my/len*dist;}
    let nx=p.x+mx,ny=p.y+my;
    nx=this.clamp(nx,0.3,8.7);ny=this.clamp(ny,0.3,17.7);
    if(p.team===0&&ny>NET_Y-0.3)ny=NET_Y-0.3;
    if(p.team===1&&ny<NET_Y+0.3)ny=NET_Y+0.3;
    p.x=nx;p.y=ny;
    if(this.keySpace&&!this.jumpConsumed){this.jumpConsumed=true;p.jump();}
    if(len>0.001){p.runTimer+=dt;p.isMoving=true;}else{p.runTimer=0;p.isMoving=false;}
  }

  checkHumanSwing(){
    if(!this.controlledPlayer)return;
    if(this.passClicked){this.passClicked=false;this.controlledPlayer.startSwing(false);}
    if(this.spikeClicked){this.spikeClicked=false;this.controlledPlayer.startSwing(true);}
  }

  /* checkHumanHit - 安全版本，增加 null 检查 */
  checkHumanHit(){
    if(!this.ballInPlay)return;
    if(!this.controlledPlayer)return;
    let spiking=(this.controlledPlayer.swingType===2);
    let humanRadius=spiking?1.35:1.05;
    if(this.controlledPlayer.canHit(this.ballX,this.ballY,this.ballZ,humanRadius)){
      if(this.controlledPlayer.swingType!==0&&this.controlledPlayer.swingTimer<0.22&&this.controlledPlayer.swingTimer>0.03){
        this.hitBall(this.controlledPlayer,this.controlledPlayer.swingType===2);
        this.controlledPlayer.swingTimer=0.02;
      }
    }
  }

  /* getBlunderChance - ★ 修复：恢复为 Java 原始犯错率（原网页版减半了所有值） */
  getBlunderChance(team){
    if(team===0){
      return(this.difficulty==='EASY')?0.08:(this.difficulty==='NORMAL')?0.20:0.30;
    }else{
      return(this.difficulty==='EASY')?0.45:(this.difficulty==='NORMAL')?0.20:0.06;
    }
  }

  /* checkAIHit - ★ 修复：与 Java 版本完全一致（去掉网页版额外添加的宽松判定） */
  checkAIHit(){
    if(!this.ballInPlay)return;
    for(let p of this.allPlayers){
      if(p.isHumanControlled)continue;
      if(p.aiBlunderCooldown>0&&p.canHit(this.ballX,this.ballY,this.ballZ)){
        p.swingType=0;p.swingTimer=0;continue;
      }
      if(p.canHit(this.ballX,this.ballY,this.ballZ)&&p.swingType!==0){
        if(p.aiBlunderCooldown<=0&&Math.random()<this.getBlunderChance(p.team)){
          p.aiBlunderCooldown=0.5;p.swingType=0;p.swingTimer=0;continue;
        }
        let spike=(p.swingType===2);
        this.aiDoHit(p,spike);p.swingType=0;p.swingTimer=0;
        break;
      }
    }
    if(!this.ballInPlay){for(let p of this.allPlayers)if(!p.isHumanControlled)p.aiBlunderCooldown=0;}
  }

  /* hitBall - 精确对应 Java GameCore.hitBall() */
  hitBall(p,spike){
    let vh=p.isHumanControlled?this.speedV:(spike?5.0:4.0);
    if(spike)vh*=1.5;
    this.ballVx=p.facingX*vh;this.ballVy=p.facingY*vh;
    this.ballVz=spike?-0.4:5.0;this.lastTouchedByTeam=p.team;
  }

  /* aiDoHit - 精确对应 Java GameCore.aiDoHit() */
  aiDoHit(p,spike){
    let vh=spike?(4.0+Math.random()*3.0):(3.0+Math.random()*2.5);
    let opps=(p.team===0)?this.enemyTeam:this.myTeam;
    let y0=(p.team===0)?9:0,y1=(p.team===0)?18:9;
    let bestS=-1,bx=4.5,by=(y0+y1)/2;
    let gridNX=9,gridNY=5,dx=1.0,dy=(y1-y0-1)/(gridNY-1);
    for(let i=0;i<gridNX;i++){
      for(let j=0;j<gridNY;j++){
        let tx=0.5+i*dx,ty=y0+0.5+j*dy,minD=Infinity;
        for(let o of opps){let dd=GameCore.dist(tx,ty,o.x,o.y);if(dd<minD)minD=dd;}
        if(minD>bestS){bestS=minD;bx=tx;by=ty;}
      }
    }
    let tdx=bx-p.x,tdy=by-p.y,tl=Math.sqrt(tdx*tdx+tdy*tdy);
    if(tl>0.001){p.updateFacing(tdx/tl,tdy/tl);this.ballVx=vh*tdx/tl;this.ballVy=vh*tdy/tl;}
    else{this.ballVx=p.facingX*vh;this.ballVy=p.facingY*vh;}
    this.ballVz=spike?-1.0:5.0;this.lastTouchedByTeam=p.team;
    this.myAssigned=-1;this.enemyAssigned=-1;
  }

  /* checkNet - 精确对应 Java GameCore.checkNet()，增加 ballInPlay 保护 */
  checkNet(dt){
    if(!this.ballInPlay)return;
    let prev=this.ballY-this.ballVy*dt;
    if((prev-NET_Y)*(this.ballY-NET_Y)<0&&this.ballZ<NET_H){
      this.ballY=NET_Y-(this.ballY-NET_Y)*0.3;
      this.ballVy=-this.ballVy*0.2;this.ballVz*=0.7;
      this.netHitX=this.ballX;this.netHitTimer=0.3;
    }
  }

  /* checkScore - 精确对应 Java GameCore.checkScore() */
  checkScore(){
    if(this.ballLanded)return;
    this.ballLanded=true;
    let inBounds=this.ballX>=0&&this.ballX<=9&&this.ballY>=0&&this.ballY<=18;
    let scorer=-1;
    if(inBounds){
      if(this.ballY<NET_Y){this.enemyScore++;this.servingTeam=1;scorer=1;}
      else{this.myScore++;this.servingTeam=0;scorer=0;}
    }else{
      if(this.lastTouchedByTeam===0){this.enemyScore++;this.servingTeam=1;scorer=1;}
      else if(this.lastTouchedByTeam===1){this.myScore++;this.servingTeam=0;scorer=0;}
      else{if(this.servingTeam===0){this.enemyScore++;this.servingTeam=1;scorer=1;}
           else{this.myScore++;this.servingTeam=0;scorer=0;}}
    }
    this.lastScorer=scorer;this.refArmTimer=1.5;this.playWhistle();this.cheerTimer=2.0;
    let texts=(scorer===0)?this.CHEER_WIN_TEXTS:this.CHEER_LOSE_TEXTS;
    let idx=Math.floor(Math.random()*texts.length);
    this.currentCheer=texts[idx].replace('%s',this.playerName);
    let side=Math.floor(Math.random()*4);
    if(side===0){this.cheerX=1+Math.random()*7;this.cheerY=18.3+Math.random()*1.0;}
    else if(side===1){this.cheerX=1+Math.random()*7;this.cheerY=-1.0-Math.random()*0.8;}
    else if(side===2){this.cheerX=-1.0-Math.random()*1.2;this.cheerY=2+Math.random()*14;}
    else{this.cheerX=9.0+Math.random()*1.2;this.cheerY=2+Math.random()*14;}
    this.sendScoreUI();this.state='SCORE';this.scoreTimer=0;
    this.uiState.textContent='得分!';
  }

  /* updateAI - 精确对应 Java GameCore.updateAI() */
  updateAI(dt){
    this.assignReceivers();
    for(let p of this.myTeam){
      if(p.isHumanControlled)continue;
      let rec=(this.idxIn(p,this.myTeam)===this.myAssigned);
      this.doAI(p,dt,rec);
    }
    for(let i=0;i<3;i++){
      let p=this.enemyTeam[i];
      let rec=(i===this.enemyAssigned);
      this.doAI(p,dt,rec);
    }
  }

  idxIn(p,t){for(let i=0;i<3;i++){if(t[i]===p)return i;}return-1;}

  /* assignReceivers - 精确对应 Java GameCore.assignReceivers() */
  assignReceivers(){
    if(!this.ballInPlay){this.myAssigned=-1;this.enemyAssigned=-1;return;}
    let land=this.predictLand();
    if(land===null){this.myAssigned=-1;this.enemyAssigned=-1;return;}
    this.myAssigned=this.bestRecv(this.myTeam,land);
    this.enemyAssigned=this.bestRecv(this.enemyTeam,land);
  }

  /* predictAtHeight - 精确对应 Java GameCore.predictAtHeight() */
  predictAtHeight(targetZ){
    let a=0.5*BALL_G;
    let b=-this.ballVz;
    let c=targetZ-this.ballZ;
    let disc=b*b-4*a*c;
    if(disc<0)return null;
    let t=(-b+Math.sqrt(disc))/(2*a);
    if(t<=0)t=(-b-Math.sqrt(disc))/(2*a);
    if(t<=0)return null;
    return[this.ballX+this.ballVx*t,this.ballY+this.ballVy*t,t];
  }

  /* predictLand - 精确对应 Java GameCore.predictLand() */
  predictLand(){
    if(this.ballZ<=0)return[this.ballX,this.ballY];
    let disc=this.ballVz*this.ballVz+2*BALL_G*this.ballZ;
    if(disc<0)return null;
    let t=(this.ballVz+Math.sqrt(disc))/BALL_G;
    if(t<=0)return null;
    return[this.ballX+this.ballVx*t,this.ballY+this.ballVy*t];
  }

  /* bestRecv - ★ 修复：反应时间恢复为 Java 的 0.08s（原网页版0.04s） */
  bestRecv(team,interceptPt){
    let best=Infinity,idx=-1;
    for(let i=0;i<3;i++){
      if(team[i].isHumanControlled)continue;
      let d=GameCore.dist(team[i].x,team[i].y,interceptPt[0],interceptPt[1]);
      let time=d/PlayerData.MOVE_SPEED+0.08;
      if(time<best){best=time;idx=i;}
    }
    if(team[0].team===0&&idx>=0&&this.controlledPlayer){
      let playerDist=GameCore.dist(this.controlledPlayer.x,this.controlledPlayer.y,interceptPt[0],interceptPt[1]);
      if(playerDist<2.5)return-1;
    }
    return idx;
  }

  /* doAI - ★ 修复：阈值完全对齐 Java（拦截点切直接追踪=1.2m，放弃追踪=0.2m，挥臂下限=0.3m） */
  doAI(p,dt,receiver){
    if(this.ballZ<=0.2||!this.ballInPlay){
      if(GameCore.dist(p.x,p.y,p.defX,p.defY)>0.3){
        this.moveToward(p,p.defX,p.defY,dt);
        this.updateAIFacing(p,p.defX,p.defY);
        p.runTimer+=dt;p.isMoving=true;
      }else{p.runTimer=0;p.isMoving=false;p.updateFacing(0,(p.team===0)?1:-1);}
      return;
    }

    let intercept=this.predictAtHeight(1.0);
    let targetX=p.defX,targetY=p.defY;
    let hasValidTarget=false;

    if(this.ballZ>1.2&&intercept!==null){
      targetX=intercept[0];targetY=intercept[1];hasValidTarget=true;
    }else if(this.ballZ<=1.2&&this.ballZ>0.2){
      targetX=this.ballX;targetY=this.ballY;hasValidTarget=true;
    }

    if(hasValidTarget){
      if(receiver){
        this.moveToward(p,targetX,targetY,dt);
      }else{
        let mix=0.4;
        let tx=p.defX+(targetX-p.defX)*mix;
        let ty=p.defY+(targetY-p.defY)*mix;
        tx=this.clamp(tx,0.5,8.5);ty=this.clamp(ty,0.5,17.5);
        if(p.team===0&&ty>NET_Y-0.5)ty=NET_Y-0.5;
        if(p.team===1&&ty<NET_Y+0.5)ty=NET_Y+0.5;
        this.moveToward(p,tx,ty,dt);
      }
    }else{
      if(GameCore.dist(p.x,p.y,p.defX,p.defY)>0.3)this.moveToward(p,p.defX,p.defY,dt);
    }

    this.updateAIFacing(p,targetX,targetY);
    p.runTimer+=dt;p.isMoving=true;

    if(this.ballZ>0.3&&this.ballZ<3.5&&p.canHit(this.ballX,this.ballY,this.ballZ)){
      if(p.swingType===0){
        let spike=this.ballZ>1.8&&Math.abs(p.y-NET_Y)<1.8;
        p.startSwing(spike);
      }
    }
    if(this.ballZ>2.0&&p.z<=0.01&&p.canHit(this.ballX,this.ballY,this.ballZ+0.5)){
      p.jump();
    }
  }

  /* updateAIFacing - 精确对应 Java GameCore.updateAIFacing() */
  updateAIFacing(p,tx,ty){
    let dx=tx-p.x,dy=ty-p.y,d=Math.sqrt(dx*dx+dy*dy);
    if(d>0.001)p.updateFacing(dx/d,dy/d);
  }

  /* moveToward - 精确对应 Java GameCore.moveToward() */
  moveToward(p,tx,ty,dt){
    let dx=tx-p.x,dy=ty-p.y,d=Math.sqrt(dx*dx+dy*dy);
    if(d<0.05)return;
    let step=PlayerData.MOVE_SPEED*dt;
    if(step>d)step=d;
    p.x+=dx/d*step;p.y+=dy/d*step;
    p.x=this.clamp(p.x,0.3,8.7);p.y=this.clamp(p.y,0.3,17.7);
    if(p.team===0&&p.y>NET_Y-0.3)p.y=NET_Y-0.3;
    if(p.team===1&&p.y<NET_Y+0.3)p.y=NET_Y+0.3;
  }

  consumeJump(){this.jumpConsumed=true;}

  playWhistle(){
    try{let wh=document.getElementById('whistle-audio');if(wh){wh.currentTime=0;wh.volume=0.6;wh.play().catch(()=>{});}}catch(ex){}
  }

  stopBGM(){
    let bgm=document.getElementById('bgm-audio');if(bgm){bgm.pause();bgm.currentTime=0;}
  }
}

/* ============================================================
   主程序入口 - 精确对应 Java Main.java
   ============================================================ */
(function(){
  let loginScreen=document.getElementById('login-screen'),modeScreen=document.getElementById('mode-screen'),
      nameInput=document.getElementById('name-input'),errorText=document.getElementById('error-text'),
      bgm=document.getElementById('bgm-audio');
  let core=new GameCore(canvas),gameStarted=false;

  document.getElementById('login-btn').addEventListener('click',()=>{
    let name=nameInput.value.trim();
    if(!name){errorText.textContent='名字不能为空！';return;}
    if(name.length>10){errorText.textContent='名字太长了！';return;}
    loginScreen.style.display='none';modeScreen.style.display='flex';
    if(bgm){bgm.volume=0.35;bgm.play().catch(()=>{});}
  });

  document.getElementById('btn-easy').addEventListener('click',()=>startGame('EASY'));
  document.getElementById('btn-normal').addEventListener('click',()=>startGame('NORMAL'));
  document.getElementById('btn-hard').addEventListener('click',()=>startGame('HARD'));
  document.getElementById('btn-back').addEventListener('click',()=>{
    modeScreen.style.display='none';loginScreen.style.display='flex';
    if(bgm){bgm.pause();bgm.currentTime=0;}
  });

  function startGame(difficulty){
    let name=nameInput.value.trim()||'玩家';
    core.init(difficulty,name);
    modeScreen.style.display='none';
    if(!gameStarted){gameStarted=true;core.start();
      document.addEventListener('keydown',(e)=>{
        if(e.code==='Escape'){modeScreen.style.display='flex';core.stopBGM();return;}
        core.handleKeyDown(e.code);e.preventDefault();
      });
      document.addEventListener('keyup',(e)=>{
        core.handleKeyUp(e.code);
        if(e.code==='Space')e.preventDefault();
        else if(e.code>='Digit0'&&e.code<='Digit9')e.preventDefault();
        else if(e.code==='KeyW'||e.code==='KeyA'||e.code==='KeyS'||e.code==='KeyD')e.preventDefault();
      });
      canvas.addEventListener('mousemove',(e)=>{
        let rect=canvas.getBoundingClientRect();
        let sx=(e.clientX-rect.left)*W/rect.width;
        let sy=(e.clientY-rect.top)*H/rect.height;
        core.mouseMoved(sx,sy);
      });
      canvas.addEventListener('click',(e)=>{if(e.button===0)core.passClicked=true;});
      canvas.addEventListener('contextmenu',(e)=>{e.preventDefault();core.spikeClicked=true;});
    }
  }
})();
</script>
